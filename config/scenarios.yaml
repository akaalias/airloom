# Environment scenario portfolio. Every candidate flies ALL scenarios.
# Each scenario has a FIXED turbulence seed: every candidate sees identical
# gust histories, so fitness differences are frame differences, never gust luck.
#
# wind_from_deg is meteorological: 0 = wind FROM the north, 90 = FROM the east.
# turbulence intensity names follow MIL-F-8785C low-altitude convention
# (sigma_w = 0.1 * W20 with W20 = 15/30/45 kt for light/moderate/severe).

mission:
  # identical in all scenarios: 2 km north, then 2 km south, 12 m/s ground
  # speed, 30 m AGL. Total 4 km.
  legs_m: [2000.0, -2000.0]     # +north / -north (south) along a N-S line
  cruise_speed_ms: 12.0
  altitude_m: 30.0
  accel_limit_ms2: 4.0
  sim_rate_hz: 100
  time_factor_limit: 1.6        # > 1.6x nominal leg time -> "did not complete"
  # Saturated rotors (RPM ceiling incl. battery sag, motor power, pack
  # deliverable power) CLAMP thrust rather than instantly failing: brief
  # gust transients cost tracking and energy, like real flight. Sustained
  # saturation beyond this fraction of the nominal mission time fails the
  # scenario, blamed on the dominant limiter.
  saturation_frac_limit: 0.10

aggregation:
  mode: mean_plus_worst          # or: minimax
  lambda_worst: 0.5
  # Class benchmark drawn as the target line in the gallery chart.
  # Derivation: current 7-inch long-range practice reaches ~8 g/W at cruise
  # (2806-class motor + 7x4 prop); at this mission's 12 m/s and ~1.0 kg AUW
  # that is ~125 W = ~2.9 Wh/km calm, ~2.6 for a state-of-the-art frame.
  # The calm->aggregate multiplier of this portfolio is MEASURED under the
  # CFD-calibrated model (2026-07-14): 1.90 for both the real V6 and the
  # evolved champion (frame-independent) -> 2.9 x 1.90 = ~5.5 aggregate.
  target_aggregate_whkm: 5.5
  # Record-class stretch line: ~2 Wh/km calm-cruise (Dave_C-class ultralight
  # long-range record flights, at best-range speed) x the same measured
  # 1.90 calm->aggregate ratio -> ~3.8.
  record_aggregate_whkm: 3.8

early_reject:
  # optional cheap screen: fly calm_warm first; candidates worse than the
  # current generation median by `margin` skip remaining scenarios and get a
  # finite penalized fitness (median-relative), keeping gradient information.
  enabled: false
  margin: 0.30
  penalty_factor: 2.0

rain_model:
  # Empirical heavy-rain penalties; see NASA TP-2671 (Dunham et al.) and
  # Thompson et al. heavy-rain aero-penalty studies. All knobs, not physics.
  drop_terminal_velocity_ms: 9.0
  thrust_efficiency_penalty: 0.15   # CT multiplied by (1 - this) in rain
  film_mass_kg_m2: 0.20             # water film added mass per top-projected area

scenarios:
  calm_warm:
    description: "25 C, no wind, no rain (baseline / sanity case)"
    temperature_c: 25.0
    wind_speed_ms: 0.0
    wind_from_deg: 0.0
    turbulence: none
    rain_mm_h: 0.0
    seed: 101
  cold_headwind:
    description: "5 C, 8 m/s from north, moderate Dryden turbulence"
    temperature_c: 5.0
    wind_speed_ms: 8.0
    wind_from_deg: 0.0
    turbulence: moderate
    rain_mm_h: 0.0
    seed: 102
  storm:
    description: "5 C, 8 m/s north, severe turbulence, 25 mm/h rain"
    temperature_c: 5.0
    wind_speed_ms: 8.0
    wind_from_deg: 0.0
    turbulence: severe
    rain_mm_h: 25.0
    seed: 103
  crosswind:
    description: "15 C, 10 m/s pure crosswind from east, moderate turbulence"
    temperature_c: 15.0
    wind_speed_ms: 10.0
    wind_from_deg: 90.0
    turbulence: moderate
    rain_mm_h: 0.0
    seed: 104
  gusty_light:
    description: "10 C, 4 m/s from northwest, severe gusts (control effort & loads)"
    temperature_c: 10.0
    wind_speed_ms: 4.0
    wind_from_deg: 315.0
    turbulence: severe
    rain_mm_h: 0.0
    seed: 105
  hot_thin:
    description: "35 C, density altitude 1500 m (thin air), light wind"
    temperature_c: 35.0
    density_altitude_m: 1500.0
    wind_speed_ms: 2.0
    wind_from_deg: 0.0
    turbulence: light
    rain_mm_h: 0.0
    seed: 106
